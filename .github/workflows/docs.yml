name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Composer deps
        run: composer install --no-interaction --no-progress

      - name: Generate API reference
        run: |
          # phpDocumentor + a Node script that converts XML output to Markdown
          # under docs/api/. Implementation deferred until first docs deploy.
          mkdir -p docs/api
          echo "# API Reference" > docs/api/index.md
          echo "_Auto-generated reference will land here in a follow-up._" >> docs/api/index.md

      - name: Install npm deps
        run: cd docs && npm ci

      - name: Build site
        run: cd docs && npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
